<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    JobText favicon (default — no unread). At tab size (16–32px) the two-letter
    "Jt" mark turns to mush, so the favicon carries a single enlarged J from
    public/icons/jobtext-icon.svg, optically centered on the petrol tile.
    The unread variant lives in favicon-unread.svg; the title/favicon manager
    (src/lib/push/use-unread-title.ts) swaps between the two (G9).
  -->
  <rect x="0" y="0" width="512" height="512" rx="116" ry="116" fill="#0F766E"/>
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <!-- The icon's J path, scaled 1.25× about its ink center (158,258) and
         moved to the canvas center. -->
    <g transform="translate(256 256) scale(1.25) translate(-158 -258)">
      <path d="M 214 154 V 304 A 58 58 0 0 1 102 324" stroke-width="54"/>
    </g>
  </g>
</svg>
