<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Loonext favicon (default — no unread). The double-o mark (#206) on the
    paper tile with the hairline border (brand/loonext-tile.svg): first ring
    ink, second ring olive — the colored O of the wordmark. The two thick
    rings stay legible at tab size (16–32px). The unread variant lives in
    favicon-unread.svg; use-unread-title.ts swaps between the two (G9).
  -->
  <rect x="0" y="0" width="512" height="512" rx="116" ry="116" fill="#FDFDF9"/>
  <rect x="0" y="0" width="512" height="512" rx="116" ry="116" fill="none" stroke="#E8E8E0" stroke-width="4"/>
  <circle cx="172" cy="256" r="60" fill="none" stroke="#191B14" stroke-width="36"/>
  <circle cx="340" cy="256" r="60" fill="none" stroke="#66801F" stroke-width="36"/>
</svg>
