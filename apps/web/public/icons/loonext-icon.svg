<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Loonext double-o mark (#206) — the bare brand mark for web use.

    Design: the "oo" of Loonext as two thick rings, first ring ink
    (#191B14), second ring olive (#66801F) — the colored O of the wordmark.
    Light-context colors; dark contexts use paper #F0F1E5 + lime #B9CF57.
    Geometry: r=86, stroke=52, 16px gap (brand/loonext-mark.svg, the source
    of truth — see brand/README.md).

    Rasters (favicon.ico, apple-touch, PWA icons, og card) are generated by
    brand/generate.mjs from the brand/ SVG sources, not from this file.
  -->
  <circle cx="136" cy="256" r="86" fill="none" stroke="#191B14" stroke-width="52"/>
  <circle cx="376" cy="256" r="86" fill="none" stroke="#66801F" stroke-width="52"/>
</svg>
