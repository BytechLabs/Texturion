<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F766E" />
    <title>You're offline. JobText</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!--
      Offline app-shell fallback (DESIGN.md G9), precached and served by
      public/sw.js when a navigation can't reach the network. Self-contained
      on purpose: inline styles, no app bundle, honors dark mode and
      reduced motion (G11).
    -->
    <style>
      :root {
        --bg: #fafaf9; /* stone-50 */
        --surface: #ffffff;
        --border: #e7e5e4; /* stone-200 */
        --text: #1c1917; /* stone-900 */
        --muted: #78716c; /* stone-500 */
        --accent: #0f766e; /* petrol */
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0a09; /* stone-950 */
          --surface: #1c1917; /* stone-900 */
          --border: #292524; /* stone-800 */
          --text: #fafaf9;
          --muted: #a8a29e; /* stone-400 */
          --accent: #14b8a6; /* teal-500 on dark */
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        line-height: 1.5;
      }
      main {
        max-width: 380px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 32px 24px;
        text-align: center;
      }
      img {
        width: 56px;
        height: 56px;
        display: block;
        margin: 0 auto 16px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.2;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: var(--muted);
        margin: 0 0 20px;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        min-height: 44px;
        cursor: pointer;
        transition: opacity 150ms ease-out;
      }
      button:hover {
        opacity: 0.9;
      }
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      @media (prefers-reduced-motion: reduce) {
        button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" width="56" height="56" />
      <h1>You're offline. JobText needs a connection.</h1>
      <p>Your conversations will be right here once you're back online.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
