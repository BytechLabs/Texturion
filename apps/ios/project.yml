# XcodeGen project — run `xcodegen generate` (brew install xcodegen) on macOS,
# then open Loonext.xcodeproj in Xcode 26+. Deployment target is iOS 26 so the
# whole app adopts Liquid Glass natively.
name: Loonext
options:
  bundleIdPrefix: com.loonext
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
packages:
  TelnyxRTC:
    url: https://github.com/team-telnyx/telnyx-webrtc-ios
    majorVersion: 4.1.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 12.16.0
targets:
  Loonext:
    type: application
    platform: iOS
    sources:
      - Loonext
    dependencies:
      - package: TelnyxRTC
      # Alert pushes ride the #151 FCM sender; FirebaseMessaging supplies the
      # registration token. Init is guarded — absent GoogleService-Info.plist
      # keeps the whole stack a no-op (mirrors Android's PushRegistrar).
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseCore
    entitlements:
      path: Loonext/Loonext.entitlements
      properties:
        # Universal links: https://app.loonext.com/inbox/{id} + /calls open in
        # the app instead of Safari (the Android app-links twin). Needs the
        # apple-app-site-association file served by the web app.
        com.apple.developer.associated-domains:
          - applinks:app.loonext.com
        # APNs delivery for the #151 alert pushes; archive export rewrites
        # this to production.
        aps-environment: development
    entitlements:
      path: Loonext/Loonext.entitlements
      properties:
        # Required for APNs registration (push stays a guarded no-op without
        # GoogleService-Info.plist). Xcode flips to production at distribution.
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loonext.ios
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Loonext uses the microphone for phone calls."
        INFOPLIST_KEY_UIBackgroundModes: "audio voip remote-notification"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
  LoonextTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LoonextTests
    dependencies:
      - target: Loonext
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loonext.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  Loonext:
    build:
      targets:
        Loonext: all
        LoonextTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LoonextTests
