name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      # Optional (blank = no captcha widget). MUST be set BEFORE enabling the
      # Supabase Auth captcha dashboard setting, or every deployed email/password
      # signup, login, and password-reset request fails captcha verification.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      # Optional (blank = no host split). D27: when set (https://app.loonext.com),
      # the middleware serves ONLY marketing pages on loonext.com and ONLY the
      # product on this origin. Both hostnames must be attached to the web Worker.
      NEXT_PUBLIC_APP_ORIGIN: ${{ secrets.NEXT_PUBLIC_APP_ORIGIN }}
      # #130: the blog subdomain. When set, the middleware serves the blog at
      # blog.loonext.com's root (blog.loonext.com/<slug> renders /blog/<slug>).
      # The value is public (it ships in the browser bundle), so it's inlined
      # here directly rather than via a secret. blog.loonext.com must also be
      # attached as a custom domain on the web Worker for the host to resolve.
      NEXT_PUBLIC_BLOG_ORIGIN: https://blog.loonext.com
      # Optional client telemetry (blank = off — env.ts coerces "" → undefined,
      # both are schema-optional). Browser Sentry (D13) and PostHog (D8/D12)
      # activate only when set. NEXT_PUBLIC_* are inlined by `next build`, so
      # they must be present at BUILD time here, not as runtime Worker vars.
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      # Optional (blank = no GTM, no consent banner). #124: marketing-only
      # Google Tag Manager. When set, the marketing pages load the container
      # under Consent Mode v2 (default denied) and show the consent banner.
      # The id is public (it ships in the browser bundle); it lives in a secret
      # only to follow the pattern above. CI's build job deliberately omits it —
      # that artifact is never deployed and dev/CI builds must not load GTM.
      NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push

      - name: Deploy api Worker
        run: pnpm --filter @loonext/api exec wrangler deploy

      - name: Deploy web Worker (OpenNext build + deploy)
        run: pnpm --filter @loonext/web run deploy

      # The marketing HTML is edge-cached (Cloudflare Cache Rule on
      # http.host eq "loonext.com" + Cache-Control s-maxage=3600 from
      # next.config.ts) so repeat requests skip the OpenNext cold-isolate.
      # That means a fresh deploy stays hidden behind stale cache for up to an
      # hour unless we purge. purge_everything is safe here: only the marketing
      # apex is cacheable, and _next/static assets are content-hashed so they
      # re-cache on the next request under new URLs. Needs the deploy token to
      # carry Zone → Cache Purge for the loonext.com zone.
      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          resp=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true'
