name: Mobile

# Native app CI (#150). Separate from the web CI workflow so deploy.yml's
# workflow_run trigger (workflows: [CI]) is untouched, and path-filtered so
# macOS minutes are spent only when mobile code actually changes.
on:
  pull_request:
    paths:
      - "apps/android/**"
      - "apps/ios/**"
      - ".github/workflows/mobile.yml"
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - "apps/ios/**"
      - ".github/workflows/mobile.yml"

concurrency:
  group: mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (assemble + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      # compileSdk 37 — newer than the runner image's preinstalled set.
      - name: Install SDK 37
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-37" "build-tools;37.0.0" > /dev/null

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: loonext-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  ios:
    name: iOS (build + unit tests)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      # The app targets iOS 26 (Liquid Glass) — Xcode 26+ is required. Runner
      # images ship several Xcodes; pick the newest 26.x and fail with the
      # available list if none exists (means the image is too old).
      - name: Select Xcode 26
        run: |
          ls -d /Applications/Xcode*.app
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26 on this image — see the list above; bump runs-on to a newer macOS image."
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          xcrun simctl list devices available
          UDID=$(xcrun simctl list devices available | grep -Eo 'iPhone [^(]*\(([0-9A-F-]+)\)' | head -1 | grep -Eo '[0-9A-F-]{36}')
          if [ -z "$UDID" ]; then
            echo "::error::No available iPhone simulator on this image."
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          xcodebuild build \
            -project Loonext.xcodeproj \
            -scheme Loonext \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests
        run: |
          xcodebuild test \
            -project Loonext.xcodeproj \
            -scheme Loonext \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
