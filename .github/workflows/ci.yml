name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # next build inlines these; web/src/env.ts fails the build if they are missing.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build web (next build)
        run: pnpm --filter @jobtext/web build

      - name: Build web (OpenNext Cloudflare adapter)
        run: pnpm --filter @jobtext/web exec opennextjs-cloudflare build

      - name: Validate api Worker (wrangler deploy --dry-run)
        run: pnpm --filter @jobtext/api exec wrangler deploy --dry-run --outdir=dist
