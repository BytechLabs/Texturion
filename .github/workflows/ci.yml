name: CI

on:
  pull_request:
  push:
    branches: [main]

# #122: cancel superseded runs. Pushing a new commit to a PR (or to main)
# supersedes the in-flight CI for that ref, so the old run is wasted work and
# just delays the queue. Scoped per workflow+ref so unrelated branches never
# cancel each other; main cancels its own older runs so the deploy that
# workflow_run triggers is always for the newest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema:
    name: SQL tests (Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm is only needed to run the root db:test:ci script (docker/psql, no install).
      - uses: pnpm/action-setup@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations from zero (db reset)
        run: supabase db reset

      # Runs every suite in supabase/tests/ against the container supabase start
      # created. The ordered list lives in the root package.json db:test:all
      # script (source of truth); db:test:ci delegates to it.
      - name: Run SQL assertion suites
        run: pnpm run db:test:ci

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Launch-pass E2E (hermetic golden paths)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Stand up the SAME local Supabase the SQL job uses: `supabase start`
      # names the DB container supabase_db_Loonext (project_id in config.toml)
      # and serves the API at 127.0.0.1:54321 with the CLI-default keys — the
      # exact host/keys the D31 harness resolves via `supabase status -o json`
      # (with the literal fallbacks). `db reset` applies migrations from zero.
      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations from zero (db reset)
        run: supabase db reset

      # The harness runs the REAL Worker (app.fetch) against that DB with only
      # the vendor HTTP boundary faked (in-process node:http servers), so the
      # api package's deps must be installed to import src/.
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run launch-pass E2E (smoke + 3 golden paths)
        run: pnpm --filter @loonext/api test:e2e

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  # #122: verify (typecheck + lint + test) is split OFF the build job so the two
  # heavy builds no longer sit behind it — the two jobs run in parallel, so the
  # critical path is max(verify, build) instead of their sum. Fast red/green on
  # a type error or failing test lands without waiting for a full build.
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Reuse the TS incremental buildinfo across runs so `tsc --noEmit` only
      # re-checks what changed (apps/web/tsconfig.json sets incremental: true;
      # the api package has no incremental build, so only web has a file). A
      # source change busts the key; restore-keys give partial reuse.
      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: apps/web/tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*.ts', 'apps/web/src/**/*.tsx') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

  build:
    name: Build (next + OpenNext + wrangler)
    runs-on: ubuntu-latest
    env:
      # next build inlines these; web/src/env.ts fails the build if they are
      # missing. env.ts only validates SHAPE (NEXT_PUBLIC_SUPABASE_URL is
      # z.url(), the publishable key is a non-empty string) and the CI build
      # artifact is NEVER deployed — deploy.yml rebuilds with the real secrets —
      # so ALL of these are fixed placeholders that keep this job deterministic
      # and independent of repo-secret configuration.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      NEXT_PUBLIC_API_URL: https://api.loonext.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # #122: Next's own recommended CI cache — .next/cache holds the compiler
      # + type + image caches, so an incremental `next build` reuses unchanged
      # work instead of compiling the whole app every run. Keyed on the lockfile
      # + all source so a real change busts it; restore-keys give partial reuse.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*.ts', 'apps/web/src/**/*.tsx', 'apps/web/src/**/*.css') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build web (next build)
        run: pnpm --filter @loonext/web build

      - name: Build web (OpenNext Cloudflare adapter)
        run: pnpm --filter @loonext/web exec opennextjs-cloudflare build

      - name: Validate api Worker (wrangler deploy --dry-run)
        run: pnpm --filter @loonext/api exec wrangler deploy --dry-run --outdir=dist
