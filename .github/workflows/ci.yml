name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  schema:
    name: SQL tests (Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm is only needed to run the root db:test:ci script (docker/psql, no install).
      - uses: pnpm/action-setup@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations from zero (db reset)
        run: supabase db reset

      # Runs every suite in supabase/tests/ against the container supabase start
      # created. The ordered list lives in the root package.json db:test:all
      # script (source of truth); db:test:ci delegates to it.
      - name: Run SQL assertion suites
        run: pnpm run db:test:ci

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  ci:
    runs-on: ubuntu-latest
    env:
      # next build inlines these; web/src/env.ts fails the build if they are missing.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      # env.ts only requires a syntactically valid URL (z.url()); the CI build
      # artifact is never deployed (deploy.yml rebuilds with the real secret),
      # so a fixed placeholder keeps this job deterministic.
      NEXT_PUBLIC_API_URL: https://api.jobtext.app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build web (next build)
        run: pnpm --filter @jobtext/web build

      - name: Build web (OpenNext Cloudflare adapter)
        run: pnpm --filter @jobtext/web exec opennextjs-cloudflare build

      - name: Validate api Worker (wrangler deploy --dry-run)
        run: pnpm --filter @jobtext/api exec wrangler deploy --dry-run --outdir=dist
